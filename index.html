<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="app.js"></script>
</head>
<body>
    <div>
        <section class="quiz-start">
            <h3 id="quiz-text">Start Quiz?</h3>
            <button id="start-quiz" >Yes</button>
        </section>

        <section class="questionsBox">
                <h3 id="question-number"></h3>
                <h3 id="question-text"></h3>
        </section>

        <section class="categoriesBox">
            <button id="category-One">CSS</button>
            <button id="category-Two">Javascript</button>
        </section>

        <section class="answersBox" >
            <button id="answer-One"></button>
            <button id="answer-Two"></button>
            <button id="answer-Three"></button>
        </section>

        <h3 id="results"></h3>
        <button id="restart">Restart Quiz</button>
    </div>
    
</body>
</html>
