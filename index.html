<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="app.js"></script>
</head>
<body>
    <h1>Quiz</h1>
    <section class="questionsBox">
            <h3 id="question-number">Question Number: </h3>
            <h3 id="question-text">Questions go here</h3>
    </section>
    <br>
    <section class="categoriesBox">
        <button id="category-One">CSS</button>
        <button id="category-Two">Javascript</button>
    </section>
    <br>
    <section class="answersBox">
        <button id="answer-One">One</button>
        <button id="answer-Two">Two</button>
        <button id="answer-Three">Three</button>
    </section>
    <br>
    <h3 id="results">Your Score is:   / 5</h3>
    <button id="restart">Restart Game</button>
</body>
</html>
